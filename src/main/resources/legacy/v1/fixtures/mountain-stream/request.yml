prompt: |
  Minecraftで実際に再現可能な、山間部の渓流から海へとつながる大規模な釣り用自然地形を生成してください。

  地形全体は、山の滝を水源とする渓流、森林に囲まれた淵や釣り池、下流の河口、そして波の荒い岩礁海岸へと自然につながる構成にしてください。単に複数の地形を並べるのではなく、水が山から海まで連続して流れ、標高、植生、水深、岩質、流れの強さが段階的に変化する、一つの完成したランドスケープとして設計してください。

  全体の想定規模は、横幅約180〜220ブロック、奥行き約250〜320ブロック、高低差約45〜65ブロックとしてください。山側を高く、海側を低くし、プレイヤーが渓流沿いの道を歩きながら各釣り場を巡れるようにしてください。

  ## 1. 山岳・水源エリア

  地形の最上流には、森林に覆われた岩山を作ってください。

  山は単純な円錐形や一直線の崖ではなく、複数の尾根、岩壁、谷、斜面、段丘を組み合わせて自然な形状にしてください。崖には石、安山岩、凝灰岩、方解石、丸石、苔むした丸石、少量の深層岩などを混ぜ、同じブロックが広範囲に連続しないようにしてください。

  山の高さは周囲の地面から約35〜50ブロックとし、頂上付近は急峻な岩場、中腹以下は土と草に覆われた斜面にしてください。山頂や尾根にはトウヒを中心とした針葉樹を配置し、中腹から下流に向かうにつれてオークや樹冠の広い落葉樹を増やしてください。

  山の岩壁から幅6〜10ブロック、高さ18〜30ブロック程度の滝を流してください。滝は一枚の平坦な水の壁ではなく、途中で岩棚にぶつかり、2〜4段程度に分かれて落下する形にしてください。

  滝の左右には突き出した岩、湿った苔、ツタ、低木、草、シダを配置してください。滝の裏側や側面には、小さな岩のくぼみや浅い洞窟を作っても構いません。

  ## 2. 滝壺

  滝の直下には、直径20〜30ブロック程度の滝壺を作ってください。

  滝壺の水深は中央で6〜9ブロック、岸際で1〜3ブロックとし、急に深くなる場所と緩やかに深くなる場所を混在させてください。水底は砂一色にせず、砂利、石、安山岩、粘土、丸石、小型の岩塊を不規則に配置してください。

  滝の落下地点には白波や水しぶきを連想させる明るいブロック表現を加え、周囲には大きな岩を置いて流れの強さを表現してください。

  滝壺の一部には流れの弱い淀みを作り、釣りが可能な場所として確保してください。ただし、滝の真正面は急流とし、場所ごとに水の雰囲気が異なるようにしてください。

  滝壺の岸には、岩の上から釣る場所、小さな木製足場、岸辺から釣る場所をそれぞれ用意してください。

  ## 3. 上流の渓流

  滝壺から下流へ、幅5〜12ブロック程度の渓流を流してください。

  川幅は一定にせず、狭い急流、岩に挟まれた瀬、少し広がる淵、小さな中州を繰り返してください。川は直線ではなく、地形に沿って緩やかに蛇行させてください。

  上流部は流れが速く、水深1〜4ブロック程度を中心としてください。川底には大きさの異なる岩、砂利、丸石を配置し、水面上にも一部の岩を露出させてください。

  高さ1〜2ブロックの小さな落差を複数作り、水が段階的に流れ落ちる渓流らしい構造にしてください。大きな滝だけでなく、小さな早瀬や段瀑を多数含めてください。

  川岸は左右対称にせず、一方は切り立った岩壁、もう一方は草地や河原になる場所を作ってください。木の根が川岸へ張り出しているような表現や、倒木、流木、苔むした岩も加えてください。

  ## 4. 森林の釣り淵

  渓流の中流には、川幅が20〜35ブロック程度まで広がる、静かな釣り淵を作ってください。

  水深は岸辺で1〜3ブロック、中央で5〜8ブロックとしてください。水中は透明感を持たせ、魚が隠れられる岩の隙間、水草、沈木、段差を作ってください。

  淵は完全な円形にせず、岩の張り出しや浅瀬によって不規則な輪郭にしてください。流入口付近は浅く流れを強め、中央は深く穏やかにし、流出口付近には岩を多めに配置してください。

  岸辺には2〜3か所の釣り場を設けてください。

  ・幅4〜6ブロック、長さ5〜8ブロック程度の小さな木製桟橋
  ・平らな岩盤から釣れる場所
  ・草地や砂利の岸から釣れる場所

  桟橋は大規模な港のようにせず、トウヒやダークオークを使った素朴な造りにしてください。柵、原木の支柱、樽、ランタンを少量配置してください。

  淵の周囲には、オーク、トウヒ、低木、シダ、草、野花を密度に差をつけながら配置してください。すべてを均等に埋めず、開けた岸と深い森林が隣接するようにしてください。

  ## 5. 渓流沿いの遊歩道

  川の片側または両側に、地形に沿った細い山道を作ってください。

  道幅は基本2〜4ブロックとし、土の道、粗い土、砂利、苔むした石を混ぜてください。道は川と完全に平行にせず、岸辺へ近づいたり、森林へ入り込んだり、高台へ上がったりするようにしてください。

  急な斜面には石段や丸太の階段を作り、危険な崖際には最小限の木柵を設けてください。人工的に整備されすぎた観光地ではなく、自然の中に後から作られた素朴な釣り道として表現してください。

  道の途中には小さな展望場所、釣り人が休めるベンチ、ランタン、道標などを少量配置してください。

  ## 6. 下流・河口エリア

  森林の渓流は徐々に川幅を広げ、海へ流れ込む河口へつなげてください。

  下流では川幅を15〜30ブロック、水深を3〜7ブロック程度にしてください。上流よりも流れを穏やかにし、川底の岩を少し減らし、砂利、砂、粘土を増やしてください。

  河口は単純に川と海が一直線につながる形にせず、岩の岬、砂利の洲、小さな入り江、流れの分岐を組み合わせてください。

  淡水と海水が混ざる場所として、片側に穏やかな浅瀬、反対側に岩で囲まれた深場を作ってください。

  河口周辺では、山間部の森林から海岸植生へ自然に変化させてください。大きな樹木を減らし、低木、草、シダ、苔、海岸沿いの岩場を増やしてください。

  ## 7. 岩礁海岸

  海側には、波の荒い険しい岩礁海岸を作ってください。

  海岸線は一直線にせず、大小の入り江、岩の岬、海食崖、孤立した岩礁、岩の裂け目を組み合わせてください。海岸全体の横幅は80〜120ブロック程度、海岸から沖側への奥行きは60〜100ブロック程度を目安にしてください。

  岩場には深層岩、丸石、安山岩、凝灰岩、石、苔むした丸石を混ぜ、黒や濃い灰色を中心とした重い印象にしてください。水面に近い岩は暗く湿った印象にし、高い場所には草や低木を少量配置してください。

  岩の突き出しは2〜8ブロック程度の大小を混ぜ、単純な階段状にならないようにしてください。海面から高さ10〜25ブロックの岩壁や崖を作り、場所によっては切り立った海食崖にしてください。

  海岸の沖には、複数の小さな岩礁や大きな離れ岩を配置してください。岩礁の周囲では波が砕けるような白い泡を表現し、荒々しい海の雰囲気を強調してください。

  ## 8. ロックフィッシュ用の海中地形

  岩礁海岸の水中には、カサゴ、メバル、ウツボなどの根魚が生息しそうな複雑な地形を作ってください。

  水深は岸際で2〜4ブロック、入り江の中央で5〜9ブロック、沖側で8〜14ブロック程度としてください。

  水底を平坦にせず、以下の地形を混ぜてください。

  ・岩の割れ目
  ・段差
  ・小さな海底崖
  ・岩穴
  ・張り出した岩の下
  ・砂利混じりの底
  ・ケルプや海草の群生
  ・孤立した大岩
  ・細長い水中溝

  カサゴやメバルが隠れられる小さな岩穴を多めに作り、ウツボが入り込める細長い裂け目や奥行きのある横穴も作ってください。

  魚の生息場所を視覚的に分かりやすくするため、岩の密集地帯、海草地帯、深い溝、浅い潮だまりを区別してください。

  ## 9. 荒磯の釣り場

  岩礁海岸には複数の釣りポイントを作ってください。

  1つ目は、岩の上から荒い海へ投げられる磯釣りポイントです。海面から3〜6ブロック程度高い平らな岩場を設け、周囲には波が当たる岩を配置してください。

  2つ目は、小さな入り江に面した木製桟橋です。桟橋は幅5〜7ブロック、長さ10〜14ブロック程度とし、岩壁から海へ張り出すようにしてください。原木の支柱、柵、ランタン、樽を少量配置してください。

  3つ目は、岩の裂け目へ糸を落とす穴釣りポイントです。岩同士の間に幅2〜5ブロック程度の細い水路を作り、その下を深くしてください。

  4つ目は、比較的波の穏やかな潮だまりです。水深1〜3ブロック程度とし、小魚や海草を観察できる場所にしてください。

  安全な場所だけでなく、険しく危険そうな岩場も残し、自然の荒々しさを損なわないようにしてください。

  ## 10. 波と水の表現

  海は完全に平坦で穏やかな水面にせず、岩場の周囲では波が砕けているように見せてください。

  白いガラス、白色系ブロック、水色系ブロック、パーティクル表現などを想定し、岩にぶつかる白波、岩の間を抜ける流れ、岸へ押し寄せる波を表現してください。

  沖側は濃い青、浅瀬は透明感のある青緑、泡立つ場所は白や水色を混ぜてください。

  渓流、滝壺、下流、河口、海で水の色と透明度に違いをつけてください。

  ・滝と上流：明るく透明な青
  ・森林の淵：深みのある青緑
  ・下流と河口：やや濁りのある青
  ・岩礁海岸：濃い青と青緑
  ・深場：暗い紺色

  ## 11. 植生

  植生はエリアごとに変化させてください。

  山頂付近はトウヒを中心とし、岩が多く植生は少なめにしてください。

  中腹と渓流周辺は、トウヒ、オーク、シダ、草、苔、低木、野花を多くしてください。

  森林の釣り淵周辺は、木々を密集させる場所と、日光が差し込む開けた場所を作ってください。

  河口付近では高木を減らし、草、低木、苔、砂利地を増やしてください。

  海岸では植物を岩の隙間や崖の上に限定し、風や波にさらされる険しい環境を表現してください。

  植生は均等に配置せず、密集、空白、群落を作り、自然な偏りを持たせてください。

  ## 12. 地形生成上の重要条件

  地形全体を左右対称にしないでください。

  川幅、岸の高さ、水深、岩の密度、木の密度を一定にしないでください。

  同じ種類の岩や木を規則的な間隔で並べないでください。

  海岸線や川岸を直線にしないでください。

  斜面を単純な一段ずつの階段形状にせず、2〜4ブロック単位の大きな地形変化と、細かな凹凸を混ぜてください。

  遠くから見たときのシルエットと、近くで見たときの細部の両方を重視してください。

  釣り場として美しいだけでなく、実際にプレイヤーが移動し、複数の場所から釣りを楽しめる構造にしてください。

  人工物は最小限に抑え、地形と調和する木製桟橋、ランタン、道、柵、樽程度にしてください。

  すべてのエリアで、魚の種類や釣り方が変わることを地形から感じられるようにしてください。

  上流では渓流魚、滝壺では大型の淡水魚、森林の淵では静水を好む魚、河口では汽水魚、岩礁海岸ではカサゴ、メバル、ウツボなどの根魚が釣れそうな雰囲気を作ってください。

  最終的には、山奥の滝から始まり、渓流、森林の淵、河口、荒々しい岩礁海岸へと水と道をたどって移動できる、探索性と釣りの多様性を持つMinecraft用の大規模自然マップとして完成させてください。


