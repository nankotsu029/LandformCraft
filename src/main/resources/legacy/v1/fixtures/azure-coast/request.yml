schema-version: 1
request-id: azure-coast-001

bounds:
  width: 400
  length: 400
  min-y: 0
  max-y: 64
  water-level: 50

prompt: |
  Minecraftで再現可能な、3種類の釣り場が連続してつながる海岸地形を生成してください。

  地形全体のサイズは、東西400ブロック、南北400ブロックとします。北側を陸地、南側を海とし、西から東へ「beach」「breakwater」「rockycape」の3ゾーンが自然につながる、一つの連続した海岸線を構成してください。

  建築物を中心としたマップではなく、海岸、水深、砂浜、岩場、低い丘陵などの自然地形を主体としてください。

  ## 全体構成

  全体面積に対する割合は、以下を目安にしてください。

  * 海：約68%
  * 陸地：約32%

  海はマップ南側を中心に広く確保し、陸地は北側から海へ張り出す形にしてください。

  海岸線を一直線にせず、砂浜の湾曲、緩やかな入り江、岩の張り出し、小さな岬などを組み合わせてください。ただし、複雑になりすぎないようにし、上から見たときに3つのゾーンが判別できる構成にしてください。

  海岸線全体は、西側の穏やかな砂浜から、中央の深い入り江、東側の荒い岩場へ向かって、地形と海底が段階的に変化するようにしてください。

  ## 陸地内の地形割合

  陸地部分の面積を100%とした場合、以下の割合を目安にしてください。

  * 砂浜および砂地：約38%
  * 平坦な草地・海岸後背地：約34%
  * 緩やかな丘陵：約16%
  * 小規模な岩場・岩の岬：約12%

  大規模な山岳地形や切り立った巨大な崖は作らないでください。

  陸地の最高地点は、海面からおおむね12〜18ブロック程度に抑えてください。大部分の陸地は、海面から3〜10ブロック程度の高さにしてください。

  陸地は平坦すぎないようにしますが、極端な起伏は避け、緩やかな段差と小さな丘を中心にしてください。

  ## ゾーン配置

  西側にbeach、中央にbreakwater、東側にrockycapeを配置してください。

  各ゾーンは完全に分離させず、境界部分で素材、水深、海岸線の形状が徐々に変わるようにしてください。

  全体に対するゾーンの面積目安は以下とします。

  * beach：約36%
  * breakwater：約34%
  * rockycape：約30%

  この面積には、それぞれのゾーンに隣接する海域と陸地の両方を含みます。

  ## beachゾーン

  マップ西側に、投げ釣りを行うための広い砂浜を作ってください。

  砂浜は、海岸線に沿って約130〜160ブロック程度の長さを持たせてください。奥行きは場所によって20〜55ブロック程度とし、均等な幅にはしないでください。

  砂浜の形状は、緩やかに湾曲した入り江としてください。一直線の海岸や、完全な半円形にはしないでください。

  砂浜の中央部は広く、両端では徐々に狭くしてください。

  砂浜は、以下のような複数の帯で構成してください。

  * 水際の濡れた砂に相当する低い帯
  * 通常の砂浜
  * 少し高くなった乾いた砂地
  * 草地へ移行する後背砂地

  水際から陸側へ向かって、1〜2ブロック単位の緩やかな段差を付けてください。

  砂浜の陸側には、高さ2〜5ブロック程度の低い砂丘を部分的に設けてください。ただし、砂丘を連続した壁のようにはしないでください。

  砂丘の間には、草地へつながる切れ目や緩やかな通路を作ってください。

  砂浜の素材は、砂を中心に、少量の砂岩、砂利、滑らかな砂岩系の素材を混ぜてください。

  砂浜全体を砂だけで塗りつぶさず、端や境界には小石、砂利、流木を連想させる小規模な装飾を加えてください。

  ### beachの海中地形

  水深は岸から沖へ向かってゆっくり深くしてください。

  水深の目安は以下とします。

  * 岸から0〜20ブロック：水深1〜3ブロック
  * 岸から20〜45ブロック：水深3〜6ブロック
  * それより沖：水深6〜10ブロック

  砂浜の海底は、滑らかな傾斜を基本としてください。

  海底には砂を多く使い、砂利、粘土、小さな岩を少量混ぜてください。

  大きな岩や急な海底崖は配置しないでください。

  投げ釣りに適した場所として、海岸から沖へ向かって障害物の少ない海域を広めに確保してください。

  海岸の一部には、小さな砂州や浅瀬を作っても構いませんが、海を完全に分断しないでください。

  ## beachからbreakwaterへの移行部

  beachとbreakwaterの境界では、砂浜が突然石造地形へ変化しないようにしてください。

  砂の中に徐々に砂利や丸石を増やし、砂浜の端を小さな石浜へ変化させてください。

  海底も、砂中心の滑らかな地形から、砂利や石を含むやや深い地形へ徐々に変化させてください。

  境界付近には、高さ2〜4ブロック程度の小さな岩場を配置してください。

  ## breakwaterゾーン

  中央には、周囲よりも水深のある入り江を作ってください。

  breakwaterゾーンは、海岸が内陸側へ入り込む形の、幅70〜100ブロック程度の湾または港状の水域としてください。

  ただし、港町や建築物は作らないでください。

  breakwaterは建物ではなく、海岸地形と一体化した低い石積みの堤防として表現してください。

  石堤の長さは90〜130ブロック程度とし、陸地から海へ向かって伸ばしてください。

  石堤は完全な直線にはせず、わずかに湾曲させるか、途中で方向を変えてください。

  幅は5〜8ブロック程度、高さは海面から2〜4ブロック程度としてください。

  巨大な防波堤や高い城壁にはしないでください。

  使用する素材は、石、丸石、安山岩、石レンガ、苔むした丸石などを不規則に混ぜてください。

  規則的で新しい人工物ではなく、周囲の岩場と馴染んだ古い石堤のようにしてください。

  階段、ハーフブロック、壁ブロックなどを使い、表面を完全に平らにしないでください。

  建物、倉庫、灯台、漁港施設などは作らないでください。

  必要に応じて、石堤の先端に高さ1〜2ブロック程度の小さな目印を置くことはできますが、大型の構造物にはしないでください。

  ### breakwater内部の水域

  石堤の内側には、比較的波の穏やかな深場を作ってください。

  内側の水深は、岸付近で3〜5ブロック、中央で7〜11ブロック程度としてください。

  水底は完全に平坦にせず、緩やかなすり鉢状にしてください。

  中央付近に、周囲より1〜3ブロック深い溝を設けてください。

  海底素材は、砂利、石、粘土、少量の砂を中心にしてください。

  水草や海草は、岸付近や石堤の根元に配置し、中央の釣りやすい場所には配置しすぎないでください。

  石堤外側は内側より深くし、水深8〜14ブロック程度としてください。

  石堤の基部周辺には、石や岩塊による段差を作り、魚が集まりそうな地形を形成してください。

  ### breakwaterの陸側

  入り江の背後には、小規模な平坦地を作ってください。

  平坦地の高さは海面から4〜7ブロック程度とし、草、粗い土、砂利、石を混ぜてください。

  この場所には建物を作らないでください。

  小道、資材置き場、港湾施設なども作らず、自然に近い海岸後背地としてください。

  ## breakwaterからrockycapeへの移行部

  中央から東側へ向かうにつれて、海岸と海底の石の割合を増やしてください。

  石堤周辺の整った石材から、自然な丸石、安山岩、凝灰岩、深層岩へ徐々に変化させてください。

  海岸線は徐々に複雑にし、小さな岩の張り出し、幅の狭い入り江、海面に露出した岩を増やしてください。

  高さの変化は緩やかにし、突然巨大な岩山へ変化させないでください。

  ## rockycapeゾーン

  マップ東側には、波が荒い岩場と小規模な岩の岬を作ってください。

  海岸線の長さは約120〜160ブロック程度とし、不規則な入り江と岩の張り出しを組み合わせてください。

  岩場は険しい印象を持たせますが、大規模な崖や巨大な山にはしないでください。

  海面からの高さは、通常3〜10ブロック程度としてください。

  局所的な高所でも、海面から12〜18ブロック程度に抑えてください。

  垂直に近い岩壁を作る場合でも、高さは6〜10ブロック程度とし、長距離にわたって連続させないでください。

  岩場の輪郭は、以下の形状を混ぜてください。

  * 海へ2〜8ブロック張り出す岩
  * 幅3〜8ブロック程度の小さな入り江
  * 海面から1〜3ブロックだけ露出する低い岩礁
  * 小規模な離れ岩
  * 岩同士の間に形成される細い水路
  * 浅い潮だまり

  沖側に配置する離れ岩は、小型のものを中心にしてください。

  巨大な島や空島は作らないでください。

  離れ岩の大きさは、直径2〜10ブロック程度を基本とし、最大でも15ブロック程度にしてください。

  離れ岩は海岸付近にのみ配置し、沖合に大きな陸地を作らないでください。

  ### rockycapeの素材

  岩場には、以下の素材を混ぜてください。

  * 石
  * 丸石
  * 安山岩
  * 凝灰岩
  * 深層岩
  * 苔むした丸石
  * 少量の砂利

  同じ素材を大きな面積で連続させず、岩の高さや水面からの距離によって素材を変化させてください。

  水面付近には、深層岩や暗い石を多めにしてください。

  高い場所では、通常の石、安山岩、少量の土や草を混ぜてください。

  苔は、水しぶきが当たりそうな岩の隙間や、陸側の湿った場所に限定してください。

  ### rockycapeの海中地形

  海底はbeachより複雑にしてください。

  岸付近の水深は2〜5ブロック、岩場の間は4〜8ブロック、沖側では8〜14ブロック程度としてください。

  海底には以下を配置してください。

  * 小さな岩塊
  * 1〜3ブロックの段差
  * 細い溝
  * 岩の間のくぼみ
  * 砂利底
  * 海草
  * ケルプ
  * 水中の張り出し

  ただし、巨大な海底峡谷や深い海溝は作らないでください。

  カサゴ、メバル、ウツボなどの根魚が潜みそうな、細かな隙間を多めに作ってください。

  岩穴は、外から内部が見える浅いくぼみとして表現してください。

  地中へ長く続く洞窟は作らないでください。

  完全に閉じた洞窟、地下空間、海底洞窟は作成しないでください。

  波が岩に当たりやすい場所には、白波を表現できるような岩の配置を行ってください。

  ## 陸地の後背地

  海岸の北側には、海岸線に沿って細長い草地を作ってください。

  草地の奥行きは、場所によって40〜100ブロック程度としてください。

  完全な平地にはせず、高さ1〜3ブロック程度の緩やかな段差と、小さな丘を配置してください。

  後背地は、以下の素材を混ぜてください。

  * 草ブロック
  * 土
  * 粗い土
  * ポドゾル
  * 砂利
  * 少量の石

  森林を密集させすぎないでください。

  木は小規模な群落として配置し、海岸が見通せる開けた場所を多く残してください。

  木の割合は、後背地全体の10〜18%程度を目安にしてください。

  オークやトウヒを中心に配置し、岩場側では木を少なくしてください。

  砂浜側では低木や草を多めにし、rockycape側では草や苔を岩の隙間に限定してください。

  ## 道

  陸側には、3つのゾーンを緩やかにつなぐ自然な小道を1本作ってください。

  道幅は2〜4ブロック程度としてください。

  砂浜の後方からbreakwaterの入り江を通り、rockycapeの陸側までつなげてください。

  道は海岸線と完全に平行にせず、海へ近づいたり、少し内陸へ離れたりする形にしてください。

  道の素材は、土の道、粗い土、砂利、少量の石を混ぜてください。

  舗装道路にはしないでください。

  橋、門、家、休憩所などの建築物は作らないでください。

  高低差がある場所でも、大規模な階段は作らず、自然な緩斜面で接続してください。

  ## 高さ設計

  海面の高さを基準として、地形の高さは以下を目安にしてください。

  * 海底最深部：海面から下へ12〜16ブロック
  * 通常の沖合：海面から下へ8〜12ブロック
  * 浅瀬：海面から下へ1〜5ブロック
  * 砂浜：海面から0〜4ブロック
  * 通常の草地：海面から4〜9ブロック
  * 小丘：海面から8〜14ブロック
  * rockycapeの高所：海面から10〜18ブロック

  地形全体の最高地点と最低地点の差を過度に大きくしないでください。

  高さの変化は、広い範囲では滑らかに、岩場などの一部では細かい段差を使ってください。

  砂浜では滑らかな勾配を優先し、rockycapeでは不規則な段差を増やしてください。

  ## 海域

  ゾーンとして明示されていない南側の海域は、通常の外洋として処理してください。

  外洋は、海岸から離れるにつれて徐々に深くしてください。

  外洋の大部分は、水深9〜14ブロック程度としてください。

  海底は完全に平坦にせず、1〜3ブロック程度の緩やかな起伏を付けてください。

  大規模な海溝、海底山脈、巨大な岩礁群は作らないでください。

  外洋の海底素材は、砂、砂利、粘土、石を広く混ぜてください。

  ケルプや海草は群落として配置し、マップ全体に均等には配置しないでください。

  beach沖では植物を少なめにし、breakwater外側とrockycape周辺では少し多めにしてください。

  ## ゾーン境界

  各ゾーンの境界を直線で区切らないでください。

  beachからbreakwaterでは、砂、砂利、石の割合を徐々に変化させてください。

  breakwaterからrockycapeでは、人工的な石堤の素材を減らし、自然岩を増やしてください。

  水深も境界で突然変化させず、20〜40ブロック程度の移行帯を設けてください。

  地形生成上はゾーンを明確に管理しながらも、実際の見た目では一つの自然な海岸にしてください。

  ## 作成しないもの

  以下の要素は作成しないでください。

  * 大規模な崖
  * 高さ20ブロックを超える海食崖
  * 巨大な山
  * 急峻な山脈
  * 地下洞窟
  * 海底洞窟
  * 長いトンネル
  * 巨大な岩穴
  * 建物
  * 家
  * 小屋
  * 倉庫
  * 港町
  * 灯台
  * 船
  * 橋
  * 塔
  * 城壁
  * 巨大な人工構造物
  * 空島
  * 浮遊する岩
  * 大型の沖合島
  * 海底峡谷
  * 深い海溝

  breakwaterについては建物として扱わず、海岸から伸びる高さの低い石堤のみ作成してください。

  ## 最終的な地形の印象

  西側は、明るく開放的で投げ釣りに適した広い砂浜としてください。

  中央は、石堤によって海の流れが弱まり、周囲よりも深い水域が形成された釣り場としてください。

  東側は、岩の張り出し、離れ岩、細い水路、小さな潮だまりが存在する、波の荒い磯釣り場としてください。

  3つのゾーンは、それぞれ異なる釣り方ができることを地形から理解できるようにしてください。

  全体は自然地形を主体とし、人工物を最小限に抑えた、400×400ブロックの連続した海岸釣りマップとして完成させてください。


