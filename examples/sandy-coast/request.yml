prompt: |
  明るく開放的で、誰が見ても「王道の砂浜」と分かる大規模な海岸地形を作ってください。
  南側から東側にかけて海を配置し、海岸線には白から淡い黄土色の砂が広がる、
  幅の広い遠浅の砂浜を作ってください。砂浜は地形全体の陸地部分のおよそ7割を占め、
  海へ向かって緩やかに低くなる自然な勾配にしてください。
  
  砂浜は一直線にせず、緩やかな弧を描く湾、浅い入り江、小さな砂州、
  ごく低い砂丘を配置してください。ただし、急峻な崖、大規模な岩礁、
  深く入り組んだ海岸線は避け、広く歩きやすい砂浜を主役にしてください。
  海は岸からしばらく浅瀬が続き、その後ゆっくり深くなる形にしてください。
  
  砂浜以外の陸地は全体の陸地部分のおよそ3割にしてください。
  北西側を中心に、緩やかな起伏を持つ草地を配置し、海岸との境界には低い砂丘草原、
  まばらな海岸松の小林、少量の低木、砂が混じる草地を作ってください。
  通常陸地の中央付近には小さな淡水池を1つ置き、細い水の流れが砂浜手前で消える、
  控えめで自然なアクセントを加えてください。
  
  全体は南国リゾートではなく、温暖な地域にある自然な砂浜としてまとめてください。
  人工物や大規模な構造物は配置せず、視界が開けた穏やかな海岸景観を優先してください。

