name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Clean build, contracts, artifact and round-trip tests
        run: ./gradlew clean build
      - name: CLI smoke
        run: |
          ./gradlew run --args="--help"
          ./gradlew run --args="doctor --data-dir build/ci-data --json"
          ./gradlew run --args="validate examples/rocky-coast/request.yml examples/rocky-coast/terrain-intent.json"
      - name: Secret and frontend artifact guard
        shell: bash
        run: |
          ! rg -n --hidden --glob '!\.git/**' --glob '!docs/**' '(sk-[A-Za-z0-9_-]{20,}|Authorization: Bearer [A-Za-z0-9])' .
          ! find . -type f \( -name package.json -o -name package-lock.json -o -name pnpm-lock.yaml -o -name yarn.lock \) -print -quit | grep .
      - name: Upload beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: landformcraft-${{ github.sha }}
          path: build/libs/LandformCraft-*.jar

  paper-smoke-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Explain manual integration split
        run: |
          test -f docs/beta-release-checklist.md
          echo 'WorldEdit and FAWE current-build smoke run in separate server directories and are release-gated, not mixed into normal CI.'
